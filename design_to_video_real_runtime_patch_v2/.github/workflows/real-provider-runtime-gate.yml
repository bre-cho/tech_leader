name: Real Provider Runtime Gate

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  real-runtime-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design_to_video_real_runtime_patch_v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile Python sources
        run: |
          python -m compileall backend
      - name: Real runtime import gate
        run: |
          python scripts/techlead_mvp_audit.py
      - name: Block placeholder paths
        run: |
          ! grep -R "Image Placeholder" frontend/components/design-studio frontend/app/design-studio -n
