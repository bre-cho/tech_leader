name: Design-to-Video Release Gate
on:
  pull_request:
  push:
    branches: [main]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: TechLead MVP Audit
        run: python scripts/techlead_mvp_audit.py
